version: '3'

services:
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    ports:
      -- "443:443"
    volumes:
      - wordpress

  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wpuser
      MARIADB_PASSWORD_FILE: /run/secrets/db_wppassword
    secrets:
      - db_root_password
      - db_wppassword

  wordpress:
    depends_on:
      - mariadb
    build: ./requirements/wordpress
    dns: 8.8.8.8
    env_file: .env
    volumes:
      - wordpress_data: /var/www/htm;
    environment:
      -WP_=value
volumes:
  mariadb_data:
  wordpress_data:
